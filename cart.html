<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      padding: 20px;
    }
    h1 {
      color: #2c6f2c;
    }
    .cart-container {
      max-width: 600px;
      margin: auto;
    }
    .cart-item {
      background: white;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-item span {
      font-weight: bold;
    }
    .remove-btn {
      background: #d9534f;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      text-align: right;
      color: #2c6f2c;
    }
    a {
      text-decoration: none;
      background: #2c6f2c;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .payment-form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .payment-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .pay-btn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }
    .delivery-form {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  margin-top: 30px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
.delivery-form input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

  </style>
</head>
<body>
    <div class="cart-container">
    <a href="Item.html">⬅ Back to Market</a>
    <h1>Your Cart</h1>
    <div id="cartItems"></div>
    <div class="total" id="totalAmount"></div>

    <div class="delivery-form">
  <h2>1. Delivery Information</h2>
  <input type="text" placeholder="Full Name" required />
  <input type="text" placeholder="Phone Number" required />
  <input type="text" placeholder="House No, Street, Area" required />
  <input type="text" placeholder="City" required />
  <input type="text" placeholder="Pincode" required />

  <h4>2. Delivery Method</h4>
  <label><input type="radio" name="deliveryMethod" value="standard" required /> Standard Delivery (3-5 Days)</label><br>
  <label><input type="radio" name="deliveryMethod" value="express" /> Express Delivery (1-2 Days)</label><br>
  <label><input type="radio" name="deliveryMethod" value="pickup" /> Self Pickup</label>
  </div>
    <div class="payment-form" id="paymentForm" style="display:none;">
      <h2>Payment Details</h2>
      <input type="text" placeholder="Card Number" maxlength="16" required />
      <input type="text" placeholder="Expiry Date (MM/YY)" required />
      <input type="text" placeholder="CVV" maxlength="3" required />
      <button class="pay-btn" onclick="submitPayment()">Pay Now</button>
    </div>
  </div>

  <script>
    const itemPrices = {
      "Tomato": 40,
      "Carrot": 30,
      "Spinach": 20,
      "Potato":25,
      "Ladyfinger":60,
      "Onion":30,
      "Apple": 120,
      "Banana": 50,
      "Mango": 80,
      "Guava":25,
      "Papaya":20,
      "Cherry":80,
      "Milk": 50,
      "Paneer": 200,
      "Butter": 150,
      "Curd":60,
      "Khoya MIlk":250,
      "Buttermilk":20
      
    };

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let cartMap = {};
    cart.forEach(item => {
      if (cartMap[item]) {
        cartMap[item]++;
      } else {
        cartMap[item] = 1;
      }
    });

    const cartItemsContainer = document.getElementById("cartItems");
    const totalAmountDiv = document.getElementById("totalAmount");
    const paymentForm = document.getElementById("paymentForm");
    let currentTotal = 0;

    function renderCart() {
      cartItemsContainer.innerHTML = "";
      let total = 0;
      const keys = Object.keys(cartMap);
      if (keys.length === 0) {
        cartItemsContainer.innerHTML = "<p>Your cart is empty.</p>";
        totalAmountDiv.textContent = "";
        paymentForm.style.display = "none";
        return;
      }

      keys.forEach(item => {
        const quantity = cartMap[item];
        const price = itemPrices[item] || 0;
        const subtotal = price * quantity;
        total += subtotal;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <span>${item} × ${quantity} = ₹${subtotal}</span>
          <button class="remove-btn" onclick="removeItem('${item}')">Remove</button>
        `;
        cartItemsContainer.appendChild(div);
      });

      currentTotal = total;
      totalAmountDiv.textContent = `Total: ₹${total}`;
      paymentForm.style.display = "block";
    }

    function removeItem(item) {
      if (cartMap[item]) {
        cartMap[item]--;
        if (cartMap[item] <= 0) {
          delete cartMap[item];
        }
        let newCart = [];
        for (const key in cartMap) {
          for (let i = 0; i < cartMap[key]; i++) {
            newCart.push(key);
          }
        }
        localStorage.setItem("cart", JSON.stringify(newCart));
        renderCart();
      }
    }

    function submitPayment() {
      alert("Payment of ₹" + currentTotal + " was successful!");
      localStorage.removeItem("cart");
      window.location.href = "mainfarmer.html";
    }

    renderCart();
  </script>

</body>
</html>
