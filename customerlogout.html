<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logout - Local Farmer's Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .logout-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      color: #4CAF50;
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 25px;
      color: #333;
    }

    a {
      text-decoration: none;
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background-color 0.3s;
    }

    a:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="logout-container">
    <h2>You have been logged out</h2>
    <p>Thank you for visiting Local Farmer's Marketplace.</p>
    <a href="LocalFarmerMarketplace.html">Go to Signup / Login</a>
  </div>

</body>
</html>
