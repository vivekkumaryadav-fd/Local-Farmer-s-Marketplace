<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Products</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f8e9;
      margin: 0;
    }

    header {
      background-color: #388e3c;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 20px;
    }

    .product {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
      border-radius: 6px;
      background-color: #fafafa;
    }

    .product h3 {
      margin: 0;
      color: #388e3c;
    }

    .product p {
      margin: 5px 0;
    }

    a.back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #2e7d32;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Products</h1>
  </header>

  <div class="container">
    <h2>List of Added Products</h2>
    <div id="productList"></div>

    <a class="back" href="FarmerViewPage.html">← Back to Home</a>
  </div>

  <script>
    const products = JSON.parse(localStorage.getItem("farmerProducts")) || [];
    const productList = document.getElementById("productList");

    if (products.length === 0) {
      productList.innerHTML = "<p>No products added yet.</p>";
    } else {
      products.forEach((p, index) => {
        productList.innerHTML += `
          <div class="product">
            <h3>${p.name}</h3>
            <p><strong>Category:</strong> ${p.category}</p>
            <p><strong>Description:</strong> ${p.description}</p>
            <p><strong>Price:</strong> ₹${p.price}</p>
            <p><strong>Quantity:</strong> ${p.quantity}</p>
            <p><small>Added on: ${p.addedAt}</small></p>
          </div>
        `;
      });
    }
  </script>

</body>
</html>
